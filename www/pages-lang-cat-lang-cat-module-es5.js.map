export default "<ion-header>\n  <ion-toolbar class=\"new-background-color\">\n    <ion-buttons slot=\"start\">\n      <ion-menu-button></ion-menu-button>\n    </ion-buttons>\n    <ion-title>Languages</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n\n\n<ion-content class=\"trick-content\">\n\n  \n  <div class=\"tricks-level\">     \n    <ion-list>\n      <ion-item lines=\"none\" color=\"none\" (click)=\"openElPlusPage('english','English')\">\n        <ion-label>\n          <div class=\"labelCls\">\n          English\n        </div>\n        </ion-label>\n      </ion-item>\n\n      <ion-item lines=\"none\" color=\"none\" (click)=\"openElPlusPage('french','French')\">\n        <ion-label>\n          <div class=\"labelCls\">\n          French\n          </div>\n        </ion-label>\n      </ion-item>\n      <ion-item lines=\"none\" color=\"none\" (click)=\"openElPlusPage('spanish','Spanish')\">\n        <ion-label>\n          <div class=\"labelCls\">\n          Spanish\n          </div>\n        </ion-label>\n      </ion-item>\n      <ion-item lines=\"none\" color=\"none\" (click)=\"openElPlusPage('hindi','Hindi')\">\n        <ion-label>\n          <div class=\"labelCls\">\n          Hindi\n          </div>\n        </ion-label>\n      </ion-item>\n    </ion-list>\n  </div>\n</ion-content>\n";
