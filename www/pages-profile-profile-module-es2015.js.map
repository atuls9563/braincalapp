export default "<ion-header>\n  <ion-toolbar class=\"new-background-color\">\n    <ion-buttons slot=\"start\">\n      <ion-menu-button></ion-menu-button>\n    </ion-buttons>\n    <ion-title>Edit Profile</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<div *ngIf=\"requestInProgress\" class=\"preloader-wrap\">\n  <div  class=\"preloader\"></div>\n</div>\n\n<ion-content>\n  <!-- <div class=\"profile-box\"> -->\n    <div>\n      <form [formGroup]=\"profileForm\" (ngSubmit)=\"update(profileForm.valid)\">\n        <ion-row>\n          <ion-col>\n            <ion-list inset>\n\n              <ion-item>\n                <ion-label color=\"primary\" floating>\n                  <ion-icon name=\"person\"></ion-icon>\n                  First Name\n                </ion-label>\n                <ion-input type=\"text\"  formControlName=\"firstname\"  maxlength=\"10\"></ion-input>\n             </ion-item>\n\n             <ion-item>\n              <ion-label color=\"primary\" floating>\n                <ion-icon name=\"person\"></ion-icon>\n                Last Name\n              </ion-label>\n              <ion-input type=\"text\"  formControlName=\"lastname\" maxlength=\"15\"></ion-input>\n          </ion-item>\n\n          <ion-item>\n            <ion-label color=\"primary\" floating>\n              <ion-icon name=\"mail\"></ion-icon>\n              Email\n            </ion-label>\n            <ion-input type=\"text\" [ngClass]=\"{'has-error':!profileForm.controls['email'].valid}\"  formControlName=\"email\"></ion-input>\n            <div *ngIf=\"profileForm.controls['email'].hasError('email') && profileForm.controls['email'].touched\" class=\"alert alert-danger\">Invalid email.</div>\n\n          </ion-item>\n\n          <ion-item>\n            <ion-label color=\"primary\" floating>\n              <ion-icon name=\"phone-portrait\"></ion-icon>\n              Mobile\n            </ion-label>\n            <ion-input type=\"text\"  formControlName=\"mobile\"></ion-input>\n          </ion-item>\n\n          <!-- <button type=\"submit\" [disabled]=\"!profileForm.valid\" ion-button>Update</button> -->\n\n          <ion-button color=\"secondary\" expand=\"block\" type=\"submit\" \n          [disabled]=\"!profileForm.valid\">Update</ion-button>\n            </ion-list>\n          </ion-col>\n        </ion-row>\n      </form>\n  </div>\n\n</ion-content>\n";
