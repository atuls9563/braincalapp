export default "<!-- <ion-header>\n  <ion-navbar>\n    <button ion-button menuToggle class=\"\">\n      <ion-icon name=\"menu\"></ion-icon>\n    </button>\n    <ion-title *ngIf=\"lang.title.rendered\" [innerHTML]=\"lang.title.rendered\"></ion-title>\n  </ion-navbar>\n</ion-header> -->\n\n<ion-header>\n  <ion-toolbar class=\"new-background-color\">    \n    <ion-back-button></ion-back-button>\n    <ion-title *ngIf=\"lang.title.rendered\" [innerHTML]=\"lang.title.rendered\"></ion-title>\n  </ion-toolbar>\n</ion-header>\n\n\n<ion-content class=\"trick-content\">\n  <div *ngIf=\"lang\" class=\"single-trick\">\n    <h2 [innerHTML]=\"lang.title.rendered\"></h2>\n    <div class=\"trick-details\">  \n        <div *ngIf=\"userFavorites\" class=\"favorite\">\n            <div *ngIf=\"userFavorites.indexOf(lang.id)==-1\" (click)=\"addFavorite(lang.id)\">\n              <!-- <ion-icon ios=\"ios-heart-outline\" md=\"md-heart-outline\"></ion-icon> -->\n              <ion-icon ios=\"heart-outline\" md=\"heart-outline\"></ion-icon>\n            </div>   \n            <div *ngIf=\"userFavorites.indexOf(lang.id)>=0\" (click)=\"removeFavorite(lang.id)\">\n              <!-- <ion-icon ios=\"ios-heart\" md=\"md-heart\"></ion-icon> -->\n              <ion-icon ios=\"heart\" md=\"heart\"></ion-icon>\n            </div>     \n      </div>\n      <div></div>\n      \n      \n      <div [innerHTML]=\"lang.content.rendered\"></div>\n      \n    </div>\n  </div>\n</ion-content>\n";
