<ion-header>
    <ion-toolbar class="new-background-color">
        <ion-title class="ion-text-center">
            Login
        </ion-title>
    </ion-toolbar>
</ion-header>

<!-- *ngIf="requestInProgress" -->
<div *ngIf="requestInProgress" class="preloader-wrap">
    <div class="preloader"></div>
</div>



<!-- <ion-content fullscreen="true" class="login-content" padding> -->
<ion-content fullscreen="true" class="login-content">
    <!-- <img src="assets/img/logo.png" alt="braincal"> -->
    <ion-grid>
        <!-- <ion-row  class="login-wrap"> -->
        <ion-row>
            <!-- <ion-row class="ion-align-items-center ion-no-padding"> -->
            <ion-row class="centerLogin">
                <ion-col>
                    <img src="assets/img/logo.png" alt="braincal">
                </ion-col>
            </ion-row>
            <!-- <ion-row class="logo-row braincal-logo">
                <ion-col class="logo-container">
                    <img src="assets/img/logo.png" alt="braincal">
                </ion-col>
            </ion-row> -->

            <!-- <div class="login-box"> -->
            <div>
                <form [formGroup]="loginForm" (ngSubmit)="login(loginForm.valid)">
                    <ion-row class="ion-align-items-center">
                        <ion-col>
                            <ion-list inset>
                                <ion-select formControlName="country" class="select-country">
                                    <ion-select-option value="">Choose Country</ion-select-option>
                                    <ion-select-option *ngFor="let country of countries" value="{{country.code}}">
                                        {{country.name}}</ion-select-option>
                                </ion-select>
                                <div *ngIf="loginForm.controls['country'].hasError('required') && loginForm.controls['country'].touched"
                                    class="alert alert-danger">Country Required.</div>

                                <ion-item>
                                    <ion-label color="primary" floating>
                                        <!--   <ion-icon name="ios-phone-portrait"></ion-icon> -->
                                        <ion-icon name="phone-portrait"></ion-icon>
                                        Mobile
                                    </ion-label>
                                    <ion-input type="text" [ngClass]="{'has-error':!loginForm.controls['mobile'].valid}"
                                        formControlName="mobile"></ion-input>
                                    <div *ngIf="loginForm.controls['mobile'].hasError('required') && loginForm.controls['mobile'].touched"
                                        class="alert alert-danger">Mobile number required.</div>
                                </ion-item>
                                <!-- <button type="submit" [disabled]="!loginForm.valid" ion-button>Login</button> -->
                                <ion-button color="secondary" expand="block" type="submit"
                                    [disabled]="!loginForm.valid">
                                    Login</ion-button>
                                <!-- <ion-button color="secondary" (click)="go()">
                                    LoginTest</ion-button> -->
                            </ion-list>

                            <!-- <ion-button expand="block" color="#DD4B39" class="loginBtn loginBtn--facebook"
                                (click)="loginWithFb()">
                                Login with Facebook</ion-button> -->
                            <ion-grid>
                                <ion-row>
                                    <ion-col></ion-col>
                                    <ion-col size="12">
                                        <ion-button expand="block" color="#DD4B39" class="loginBtn loginBtn--google"
                                            (click)="loginWithGoogle()">
                                            Login with google</ion-button>
                                    </ion-col>
                                    <!-- <ion-col size="13">
                                        <button type="button" class="loginBtn loginBtn--google"
                                            (click)="loginWithGoogle()" ion-button>Login with google</button>
                                    </ion-col> -->
                                    <ion-col></ion-col>
                                </ion-row>
                                <ion-row>
                                    <ion-col></ion-col>
                                    <ion-col size="12">
                                        <ion-button expand="block" color="#DD4B39" class="loginBtn loginBtn--facebook"
                                            (click)="loginWithFb()">
                                            Login with Facebook</ion-button>
                                        <!-- <button type="button" class="loginBtn loginBtn--facebook"
                                            (click)="loginWithFb()" ion-button>Login with Facebook</button> -->
                                    </ion-col>
                                    <ion-col></ion-col>
                                </ion-row>
                                <ion-row>
                                    <ion-col></ion-col>
                                    <ion-col size="12">                                        
                                          <ion-button expand="block" color="dark" (click)="openAppleSignIn()">
                                            <ion-icon slot="start" name="logo-apple" class="sw-Apple"></ion-icon> Sign in with Apple
                                          </ion-button>
                                    </ion-col>
                                    <ion-col></ion-col>
                                </ion-row>
                            </ion-grid>
                        </ion-col>
                    </ion-row>
                </form>
            </div>
        </ion-row>
    </ion-grid>
</ion-content>
