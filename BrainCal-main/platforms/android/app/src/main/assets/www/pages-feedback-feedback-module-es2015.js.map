export default "<ion-header>\n  <ion-toolbar class=\"new-background-color\">\n    <ion-buttons slot=\"start\">\n      <ion-menu-button></ion-menu-button>\n    </ion-buttons>\n    <ion-title>Write to us</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<div *ngIf=\"requestInProgress\" class=\"preloader-wrap\">\n  <div  class=\"preloader\"></div>\n</div>\n\n<ion-content>\n  <div>\n    <form [formGroup]=\"feedbackForm\" (ngSubmit)=\"send(feedbackForm.valid)\">\n      <ion-row>\n        <ion-col>\n          <ion-list inset>\n\n            <ion-item>\n              <ion-label color=\"primary\" floating>\n                <ion-icon name=\"contact\"></ion-icon>\n                Name\n              </ion-label>\n              <ion-input type=\"text\" [ngClass]=\"{'has-error':!feedbackForm.controls['name'].valid}\"  formControlName=\"name\"></ion-input>\n            </ion-item>\n\n           <ion-item>\n            <ion-label color=\"primary\" floating>\n              <ion-icon name=\"ios-text\"></ion-icon>\n              Message\n            </ion-label>\n            <ion-textarea formControlName=\"message\"></ion-textarea>\n          </ion-item>       \n        <ion-button color=\"secondary\" expand=\"block\" type=\"submit\" \n        [disabled]=\"!feedbackForm.valid\">Send</ion-button>        \n          </ion-list>\n        </ion-col>\n      </ion-row>\n    </form>\n</div>\n</ion-content>\n";
