export default "<ion-header>\n  <ion-toolbar class=\"new-background-color\">\n    <ion-buttons slot=\"start\">\n      <ion-menu-button></ion-menu-button>\n    </ion-buttons>\n    <ion-title>Quizes</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n\n<ion-content class=\"trick-content\" padding>\n  <div class=\"tricks-level\">\n    <ion-list>\n        <ion-item *ngFor=\"let quiz of quizes\">\n            <div class=\"level-title\" (click)=\"openQuiz(quiz)\">{{quiz.name}}</div>\n        </ion-item>\n    </ion-list>\n  </div>\n</ion-content>\n";
