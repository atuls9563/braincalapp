export default "<ion-header>\n  <ion-toolbar class=\"new-background-color\">    \n    <ion-back-button></ion-back-button>\n    <ion-title *ngIf=\"trick.title.rendered\" [innerHTML]=\"trick.title.rendered\"></ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content class=\"trick-content\">\n\n  <div *ngIf=\"trick\" class=\"single-trick\">\n    <h2 [innerHTML]=\"trick.title.rendered\"></h2>\n    <div class=\"trick-details\">  \n      <div *ngIf=\"userFavorites\" class=\"favorite\">\n          <div *ngIf=\"userFavorites.indexOf(trick.id)==-1\" (click)=\"addFavorite(trick.id)\">\n            <!-- <ion-icon ios=\"ios-heart-outline\" md=\"md-heart-outline\"></ion-icon> -->\n            <ion-icon ios=\"heart-outline\" md=\"heart-outline\"></ion-icon>\n          </div>   \n          <div *ngIf=\"userFavorites.indexOf(trick.id)>=0\" (click)=\"removeFavorite(trick.id)\">\n            <!-- <ion-icon ios=\"ios-heart\" md=\"md-heart\"></ion-icon> -->\n            <ion-icon ios=\"heart\" md=\"heart\"></ion-icon>\n          </div>     \n      </div>\n      <div></div>\n      <div *ngIf=\"trick.cover_image!=''\">\n              <img [src]=\"trick.cover_image\" #coverImage (tap)=\"showCover(coverImage)\"/>\n          \n      </div>\n      \n      <div [innerHTML]=\"trick.content.rendered\"></div>\n\n      <div *ngIf=\"trick.expression\">\n        <div class=\"playground-title\"><h3>Excersie Here</h3></div>\n        <form  [formGroup]=\"playForm\" (ngSubmit)=\"calculate(playForm.valid)\" class=\"playground\">\n          <div class=\"row\">\n            <ion-col>\n              <ion-input type=\"number\" placeholder=\"First Number\" [ngClass]=\"{'has-error':!playForm.controls['firstNumber'].valid}\"  formControlName=\"firstNumber\"></ion-input>\n            </ion-col>\n            <ion-col class=\"operand\">\n              <div>{{trick.expression}}</div>\n            </ion-col>\n            <ion-col>\n              <ion-input type=\"number\" placeholder=\"Second Number\" [ngClass]=\"{'has-error':!playForm.controls['secondNumber'].valid}\"  formControlName=\"secondNumber\"></ion-input>\n            </ion-col>\n          </div>\n          <div class=\"button-container\">\n            <button type=\"submit\" [disabled]=\"!playForm.valid\" ion-button>Show Result</button>\n          </div>\n          <div *ngIf=\"result\" class=\"result\"><b>Answer:{{result}}</b></div>\n        </form>  \n      </div>\n\n       <div *ngIf=\"trick.video\" class=\"video-container\" >\n        \n          <iframe width=\"100%\" [src]=\"getVideoURL()\" frameborder=\"0\" allowfullscreen></iframe>\n          <div class=\"video-fix\"></div>  \n        </div>\n\n    </div>\n  </div>\n</ion-content>\n";
