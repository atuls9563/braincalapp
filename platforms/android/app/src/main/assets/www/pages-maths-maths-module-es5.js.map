export default "<ion-header>\n  <ion-toolbar class=\"new-background-color\">\n    <ion-buttons slot=\"start\">\n      <ion-menu-button></ion-menu-button>\n    </ion-buttons>\n    <ion-title>Math Tricks</ion-title>\n  </ion-toolbar>\n\n  <ion-searchbar\n  [(ngModel)]=\"searchKeyword\"\n  [showCancelButton]=\"shouldShowCancel\"\n  (ionInput)=\"onInput($event)\"\n  (ionClear)=\"clearSearch()\"\n  (ionCancel)=\"onCancel($event)\"></ion-searchbar>\n</ion-header>\n\n<div *ngIf=\"requestInProgress\" class=\"preloader-wrap\">\n  <div  class=\"preloader\"></div>   \n</div>  \n\n<!-- <ion-content (swipe)=\"onSwipeUp($event)\">\n  <ion-row class=\"tricks-row\">\n    <div class=\"search-results\">\n        <ul>\n            <li *ngFor=\"let trick of trickSuggestions\">\n                <div class=\"result\" (click)=\"openTrickDetail(trick)\" [innerHTML]=\"trick.title.rendered\"></div>\n                <ion-icon ios=\"ios-arrow-forward\" md=\"md-arrow-forward\" class=\"go-to-link\"></ion-icon>\n            </li>\n        </ul>\n    </div>\n    <div class=\"tricks-list\">    \n        <ion-list>\n            <ion-item class=\"item item-text-wrap\" *ngFor=\"let trick of tricks\">\n                        <div *ngIf=\"userFavorites\" class=\"favorite\">\n                                <div *ngIf=\"userFavorites.indexOf(trick.id)==-1\" (click)=\"addFavorite(trick.id)\"><ion-icon ios=\"ios-heart-outline\" md=\"md-heart-outline\"></ion-icon></div>   \n                                <div *ngIf=\"userFavorites.indexOf(trick.id)>=0\" (click)=\"removeFavorite(trick.id)\"><ion-icon ios=\"ios-heart\" md=\"md-heart\"></ion-icon></div>     \n                        </div>    \n                \n                        <div (click)=\"openDetailPage(trick)\" [innerHTML]=\"trick.title.rendered\" class=\"trick-title\"></div>\n                        <button (click)=\"openDetailPage(trick)\">Read More</button>\n            </ion-item>\n\n            <ion-item class=\"item item-text-wrap no-trick\" *ngIf=\"tricks.length==0 && !requestInProgress\">     \n                    <div>No Contents available.</div>\n            </ion-item>\n\n            <ion-item class=\"item item-text-wrap no-trick\" *ngIf=\"tricks.length==0 && requestInProgress\">   \n                    <div *ngIf=\"requestInProgress\">Loading Contents...</div>    \n            </ion-item>\n\n        </ion-list>\n    </div>\n    <div class=\"infinitte-scroll\">\n        <ion-infinite-scroll (ionInfinite)=\"doInfinite($event)\">\n            <ion-infinite-scroll-content></ion-infinite-scroll-content>\n        </ion-infinite-scroll>\n    </div>\n</ion-row>\n</ion-content>\n\n -->\n\n\n <ion-content (swipe)=\"onSwipeUp($event)\">\n  <ion-row class=\"tricks-row\">\n    <div  class=\"search-results\">\n        <ul>\n            <li *ngFor=\"let trick of trickSuggestions\">\n                <div class=\"result\" (click)=\"openTrickDetail(trick)\" [innerHTML]=\"trick.title.rendered\"></div>\n                <!-- <ion-icon ios=\"ios-arrow-forward\" md=\"md-arrow-forward\"  ></ion-icon>                -->\n                <div class=\"result-forward-outline\">\n                <ion-icon class=\"go-to-link\" name=\"chevron-forward-outline\"></ion-icon>\n              </div>\n            </li>\n        </ul>\n    </div>\n    <div class=\"tricks-list\">    \n        <ion-list>\n            <ion-item *ngFor=\"let trick of tricks\">\n              <div *ngIf=\"userFavorites\" class=\"favorite\">\n                <!-- <div *ngIf=\"userFavorites.indexOf(trick.id)==-1\" (click)=\"addFavorite(trick.id)\"> -->\n                  <div *ngIf=\"!validateId(trick.id)\" (click)=\"addFavorite(trick.id)\">                  \n                  <ion-icon ios=\"heart-outline\" md=\"heart-outline\"></ion-icon>\n                </div>\n                <!-- <div *ngIf=\"userFavorites.indexOf(trick.id)>=0\" (click)=\"removeFavorite(trick.id)\"> -->\n                  <div *ngIf=\"validateId(trick.id)\" (click)=\"removeFavorite(trick.id)\">\n                  <ion-icon ios=\"heart\" md=\"heart\"></ion-icon>\n                </div>     \n              </div>    \n                \n              <div class=\"trick-title\" (click)=\"openDetailPage(trick)\" [innerHTML]=\"trick.title.rendered\"></div>\n              <div class=\"read-more\">\n                <button class=\"ReadMoreCls\" (click)=\"openDetailPage(trick)\">Read More</button>\n              </div>\n            </ion-item>\n\n            <ion-item *ngIf=\"tricks.length==0 && !requestInProgress\">     \n                    <div>No Contents available.</div>\n            </ion-item>\n\n            <ion-item *ngIf=\"tricks.length==0 && requestInProgress\">   \n                    <div *ngIf=\"requestInProgress\">Loading Contents...</div>    \n            </ion-item>\n\n\n        </ion-list>\n    </div>\n    <div>\n        <ion-infinite-scroll (ionInfinite)=\"doInfinite($event)\">\n            <ion-infinite-scroll-content></ion-infinite-scroll-content>\n        </ion-infinite-scroll>\n    </div>\n</ion-row>\n</ion-content>\n\n\n";
